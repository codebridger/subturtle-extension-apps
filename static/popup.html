<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Inline so it bypasses PostCSS. The build's postcss-prefix-selector
         drops `body { ... }` rules to avoid bleeding onto host pages, which
         would otherwise erase the popup's fixed dimensions. -->
    <style>
      html,
      body {
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
      }
      body {
        width: 785px;
        height: 600px;
      }
    </style>
  </head>
  <body>
    <div id="subturtle-popup" class="subturtle-scope"></div>
    <script src="./popup.js"></script>
  </body>
</html>
