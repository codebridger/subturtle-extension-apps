<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Inline so it bypasses PostCSS. The build's postcss-prefix-selector
         drops `body { ... }` rules to avoid bleeding onto host pages, which
         would otherwise erase the popup's fixed dimensions. -->
    <style>
      html,
      body {
        margin: 0;
        overflow-y: auto;
        overflow-x: hidden;
      }
      body {
        width: 785px;
        height: 600px;
        background: #ffffff;
      }
      /* Bootstrap loader visible until popup.js parses and Vue's mount()
         replaces #subturtle-popup's children. Keeps the popup from showing
         an empty white frame during the auth chain in router.beforeEach. */
      .popup-bootstrap-loader {
        width: 100%;
        height: 600px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .popup-bootstrap-loader__spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(168, 85, 247, 0.2);
        border-top-color: #a855f7;
        border-radius: 50%;
        animation: popup-bootstrap-spin 1s linear infinite;
      }
      @keyframes popup-bootstrap-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="subturtle-popup" class="subturtle-scope">
      <div class="popup-bootstrap-loader">
        <div class="popup-bootstrap-loader__spinner"></div>
      </div>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
